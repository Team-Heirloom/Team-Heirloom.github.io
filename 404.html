<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Heirloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    :root {
      --heirloom-cream: #FDFBF7;
      --heirloom-teal-600: #2C5F58;
      --heirloom-teal-700: #234B46;
      --heirloom-stone-500: #6B7280;
      --heirloom-stone-800: #1F2937;
      --heirloom-stone-900: #111827;
      --font-serif: 'Crimson Text', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--heirloom-cream);
      color: var(--heirloom-stone-800);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    h1 {
      font-family: var(--font-serif);
      font-size: 4rem;
      color: var(--heirloom-stone-900);
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--heirloom-stone-500);
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--heirloom-teal-600);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: var(--heirloom-teal-700); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist yet. We're still building.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
